server:
  port: 8081

spring:
  application:
    name: refdata-service
  profiles:
    active: sqlite
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./data/refdata.db
  sql:
    init:
      mode: always
      schema-locations: classpath:db/sqlite/*.sql
      data-locations: classpath:db/sqlite/data/*.sql

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
