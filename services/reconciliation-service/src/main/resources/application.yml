server:
  port: 8089

spring:
  application:
    name: reconciliation-service

# 对账服务配置
reconciliation:
  # 定时 cron：每 5 分钟执行一次
  cron: "0 */5 * * * *"
  # 敞口告警阈值（|netExposure| 超过此值则告警）
  exposure-alert-threshold: 5
  # 额度告警阈值（|持仓占用 - 已用额度| 超过此值则告警）
  credit-alert-threshold: 100
  # 检查最近多少笔对冲订单
  hedge-order-check-limit: 100
  # 下游服务地址（默认走 Eureka 服务名解析，也可改写为直连地址）
  position-service-url: http://position-service
  account-service-url: http://account-service
  execution-service-url: http://execution-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.bank.trading.reconciliation: INFO
