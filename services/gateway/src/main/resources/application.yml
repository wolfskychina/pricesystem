server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      # 默认与服务发现整合：通过 lb://service-name 路由到 Eureka 注册的实例
      discovery:
        locator:
          enabled: false   # 关闭"按服务名自动路由"，使用下面显式声明的路由
      routes:
        # 订单管理服务
        - id: oms-service
          uri: lb://oms-service
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1   # 去掉 /api 前缀，下游收到 /orders/**

        # 合约主数据服务
        - id: refdata-service
          uri: lb://refdata-service
          predicates:
            - Path=/api/refdata/**
          filters:
            - StripPrefix=1

        # 报价服务
        - id: pricing-service
          uri: lb://pricing-service
          predicates:
            - Path=/api/quotes/**
          filters:
            - StripPrefix=1

        # 风控服务
        - id: risk-service
          uri: lb://risk-service
          predicates:
            - Path=/api/risk/**
          filters:
            - StripPrefix=1

        # 持仓服务
        - id: position-service
          uri: lb://position-service
          predicates:
            - Path=/api/positions/**
          filters:
            - StripPrefix=1

        # 账户服务
        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/api/accounts/**
          filters:
            - StripPrefix=1

        # 对冲执行服务（查询接口）
        - id: execution-service
          uri: lb://execution-service
          predicates:
            - Path=/api/execution/**
          filters:
            - StripPrefix=1

        # 行情服务
        - id: market-data-service
          uri: lb://market-data-service
          predicates:
            - Path=/api/marketdata/**
          filters:
            - StripPrefix=1

        # 通知服务（P3 新增）
        - id: notify-service
          uri: lb://notify-service
          predicates:
            - Path=/api/notify/**
          filters:
            - StripPrefix=1

        # 对账服务（P3 新增）
        - id: reconciliation-service
          uri: lb://reconciliation-service
          predicates:
            - Path=/api/reconciliation/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.bank.trading.gateway: INFO
    org.springframework.cloud.gateway: INFO
